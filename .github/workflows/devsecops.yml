name: devsecops-gates

on:
  push:
  pull_request:
  schedule:
    - cron: "15 3 * * 1"

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git jq
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sudo sh -s -- -b /usr/local/bin
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_8.30.0_linux_x64.tar.gz | sudo tar -xz -C /usr/local/bin gitleaks
          curl -sSfL https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static -o /usr/local/bin/opa
          sudo chmod +x /usr/local/bin/opa
          curl -sSfL https://github.com/open-policy-agent/conftest/releases/latest/download/conftest_0.66.0_Linux_x86_64.tar.gz | sudo tar -xz -C /usr/local/bin conftest

      - name: Run pipeline
        run: |
          chmod +x scripts/*.sh
          ./scripts/run_pipeline.sh

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-reports
          path: |
            outputs/*.json
